name: DLsite Sales Watcher

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pyyaml

      - name: Run scraper
        continue-on-error: true
        run: python scrape_dlsite.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f data/sales_log.csv ]; then
            git add data/sales_log.csv
            git diff --staged --quiet || git commit -m "Update sales log"
            git push
          else
            echo "sales_log.csv がまだ作成されていません。Run scraperのログを確認してください。"
          fi
